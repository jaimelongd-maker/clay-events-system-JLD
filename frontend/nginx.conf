server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Intenta servir el archivo exacto, luego el directorio,
        # y si no existe cae a index.html para que React maneje la ruta.
        try_files $uri $uri/ /index.html;
    }
}
