version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: clay_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: clay_events
    networks:
      - clay_network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clay_redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks:
      - clay_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clay_backend
    ports:
      - '3001:3000'  
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/clay_events
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clay_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clay_worker
    command: node dist/worker.js
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/clay_events
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clay_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3001
    container_name: clay_frontend
    ports:
      - '3002:80'
    depends_on:
      - backend
    networks:
      - clay_network

networks:
  clay_network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
